---
apiVersion: v1
kind: Namespace
metadata:
  name: prod-cred-ns
  labels:
    name: prod-cred-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digittech-deployment
  namespace: prod-cred-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digittech-service
  template:
    metadata:
      labels:
        app: digittech-service
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      containers:
      - name: digittech-service
        image: swr.af-south-1.myhuaweicloud.com/cred-prod/digittech-service:15a8d16cacb23ad3b87debb80e5c3c962ad9e3ee
        imagePullPolicy: "IfNotPresent"
        ports:
          - containerPort: 3000
        # envFrom:
        #   - secretRef:
        #       name: digittech-secret
        resources:
          requests:
            cpu: 100m
            memory: 156Mi
          limits:
            cpu: 200m
            memory: 212Mi
      imagePullSecrets:
      - name: default-secret
---
apiVersion: v1
kind: Service
metadata:
  name: digittech-service
  namespace: prod-cred-ns
spec:
  type: NodePort # Change service type to NodePort
  selector:
    app: digittech-service
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    #nodePort: 30617 # Define a specific nodePort value (replace with desired port number)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: kubeissuer-digittech
  namespace: prod-cred-ns
spec:
  acme:
    # The ACME server URL
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email address used for ACME registration
    email: seun.adegbite@credlanche.com
    # Name of a secret used to store the ACME account private key
    privateKeySecretRef:
      name: kubeissuer-digittech
    # Enable the HTTP-01 challenge provider
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kubecert-digittech
  namespace: prod-cred-ns
spec:
  secretName: digittech
  issuerRef:
    name: kubeissuer-digittech
    kind: ClusterIssuer
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  commonName: digitvanttechnology.digitvant.com
  dnsNames:
  - digitvanttechnology.digitvant.com

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
 name: digittech-ingress
 namespace: prod-cred-ns
 annotations:
   #cert-manager.io/cluster-issuer: letsencrypt-staging
   kubernetes.io/ingress.class: nginx
spec:
 ingressClassName: nginx
 tls:
 - hosts:
   - digitvanttechnology.digitvant.com
   #secretName: mp-staging-tls
   secretName: digittech
 rules:
 - host: digitvanttechnology.digitvant.com
   http:
     paths:
     - pathType: Prefix
       path: /
       backend:
         service:
           name: digittech-service
           port:
             number: 3000